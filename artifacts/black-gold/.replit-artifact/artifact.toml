kind = "web"
previewPath = "/"
title = "Black Gold — الذهب الأسود"
version = "1.0.0"
id = "artifacts/black-gold"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18148

[services.development]
run = "pnpm --filter @workspace/black-gold run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/black-gold", "run", "build" ]
publicDir = "artifacts/black-gold/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18148"
BASE_PATH = "/"
